# This is the resource bundle for com.blueward.sample.fioritest

#Texts for manifest.json

#XTIT: Application name
appTitle=BP Fiori App

#YDES: Application description
appDescription=An SAP Fiori application.

#XTXT: Excel upload custom action in List Report toolbar
excelUploadAction=엑셀 업로드

#XTIT: Excel upload dialog title
excelUploadDialogTitle=엑셀 파일 업로드

#XTXT: Excel upload dialog instruction
excelUploadDialogInstruction=.xlsx 파일을 선택하면 상위 50행을 미리보기로 확인할 수 있습니다.

#XBUT: Select excel file button label
excelUploadSelectButton=파일 선택

#XTXT: File uploader placeholder
excelUploadPlaceholder=.xlsx 파일을 선택하세요

#XTXT: Preview status label
excelUploadPreviewStatus=미리보기

#XBUT: Confirm upload button label
excelUploadConfirmButton=업로드

#XBUT: Cancel dialog button label
excelUploadCancelButton=취소

#XTXT: Table empty state
excelUploadNoPreview=미리보기 데이터가 없습니다.

#YMSG: Missing SheetJS runtime
excelUploadLibraryMissing=엑셀 파서 라이브러리를 찾을 수 없습니다. 앱을 새로고침한 뒤 다시 시도하세요.

#YMSG: No file selected
excelUploadErrorNoFile=파일을 선택해 주세요.

#YMSG: Invalid extension
excelUploadErrorInvalidExtension=.xlsx 파일만 업로드할 수 있습니다.

#YMSG: Max file size exceeded
excelUploadErrorMaxSize=최대 10MB까지 업로드할 수 있습니다.

#YMSG: File read failed
excelUploadErrorReadFailed=파일을 읽는 중 오류가 발생했습니다.

#YMSG: Parse failed
excelUploadErrorParseFailed=엑셀 파일을 파싱할 수 없습니다. 파일 형식을 확인해 주세요.

#YMSG: No sheet in workbook
excelUploadErrorNoSheet=시트를 찾을 수 없습니다.

#YMSG: No data rows
excelUploadErrorNoDataRows=데이터 행이 없습니다. 첫 번째 행은 헤더, 두 번째 행부터 데이터가 필요합니다.

#YMSG: No columns found
excelUploadErrorNoColumns=헤더 행을 찾을 수 없습니다.

#YMSG: Summary toast after confirm
excelUploadSummaryToast=검증 완료: {0} ({1}건, 시트: {2})
