# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: com.blueward.sample.fioritest
type: application
resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8
builder:
  componentPreload:
    excludes:
      - com/blueward/sample/fioritest/thirdparty/xlsx.full.min.js
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: combluewardsamplefioritest
        relativePaths: true
        additionalFiles:
          - xs-app.json
